name: Build Windows Installer

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure CMake
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: List build artifacts
        shell: pwsh
        run: |
          Get-ChildItem -Recurse build/TheGVNR_artefacts/Release | Select-Object FullName

      - name: Find Inno Setup
        id: inno
        shell: pwsh
        run: |
          $iscc = Get-ChildItem "C:\Program Files (x86)\Inno Setup*" -Filter ISCC.exe -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $iscc) {
            Write-Host "Inno Setup not found, installing via choco..."
            choco install innosetup -y --no-progress
            $iscc = Get-ChildItem "C:\Program Files (x86)\Inno Setup*" -Filter ISCC.exe -Recurse | Select-Object -First 1
          }
          Write-Host "ISCC found at: $($iscc.FullName)"
          "iscc_path=$($iscc.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Create installer with Inno Setup
        shell: pwsh
        run: |
          & "${{ steps.inno.outputs.iscc_path }}" /V9 Installers\windows-installer.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: GVNRs-Grunger-Windows-Installer
          path: Installers/Output/GVNRs-Grunger-Installer-v*.exe

      - name: Upload raw VST3 (fallback)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: GVNRs-Grunger-VST3-Raw
          path: build/TheGVNR_artefacts/Release/VST3/
