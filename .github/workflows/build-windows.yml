name: Build Windows Installer

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure CMake
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: List build artifacts
        shell: pwsh
        run: |
          $listing = Get-ChildItem -Recurse build/TheGVNR_artefacts | Select-Object -ExpandProperty FullName | Out-String
          Write-Host $listing
          "## Build Artifacts`n``````n$listing``````n" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          $env:PATH = "C:\Program Files (x86)\Inno Setup 6;$env:PATH"
          iscc /? 2>&1 | Select-Object -First 3

      - name: Create installer with Inno Setup
        shell: pwsh
        run: |
          $env:PATH = "C:\Program Files (x86)\Inno Setup 6;$env:PATH"
          $output = & iscc Installers\windows-installer.iss 2>&1 | Out-String
          Write-Host $output
          "## ISCC Output`n``````n$output``````n" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: GVNRs-Grunger-Windows-Installer
          path: Installers/Output/GVNRs-Grunger-Installer-v*.exe

      - name: Upload raw VST3 (fallback)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: GVNRs-Grunger-VST3-Raw
          path: build/TheGVNR_artefacts/Release/VST3/
