name: Build Windows Installer

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure CMake
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: List build artifacts
        shell: pwsh
        run: |
          $listing = Get-ChildItem -Recurse build/TheGVNR_artefacts | Select-Object -ExpandProperty FullName | Out-String
          Write-Host $listing
          "## Build Artifacts`n``````n$listing``````n" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Create installer with Inno Setup
        shell: cmd
        run: |
          for /d %%d in ("C:\Program Files (x86)\Inno Setup*") do set "ISCC=%%d\ISCC.exe"
          echo Using: %ISCC%
          "%ISCC%" Installers\windows-installer.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: GVNRs-Grunger-Windows-Installer
          path: Installers/Output/GVNRs-Grunger-Installer-v*.exe

      - name: Upload raw VST3 (fallback)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: GVNRs-Grunger-VST3-Raw
          path: build/TheGVNR_artefacts/Release/VST3/
